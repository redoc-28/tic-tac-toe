name: tictactoe-nakama

database:
  address:
    - "postgres:localdb@postgres:5432/nakama"

logger:
  level: "INFO"
  stdout: true
  file: ""

console:
  port: 7351
  username: "admin"
  password: "password"
  signing_key: "defaultkey"
  token_expiry_sec: 86400

socket:
  server_key: "defaultkey"
  port: 7350
  max_message_size_bytes: 4096
  read_buffer_size_bytes: 4096
  write_buffer_size_bytes: 4096
  ping_period_ms: 15000
  pong_wait_ms: 25000
  write_wait_ms: 10000

runtime:
  js_entrypoint: "index.js"
  js_read_only_globals: false
  environment:
    - "NODE_ENV=production"

match:
  input_queue_size: 128
  call_queue_size: 128
  join_attempt_queue_size: 128
  join_marker_deadline_ms: 15000
  max_empty_sec: 60

session:
  token_expiry_sec: 7200
  refresh_token_expiry_sec: 604800

leaderboard:
  callback_queue_size: 65536
